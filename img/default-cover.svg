<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#fd79a8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- 音符图标 -->
  <g transform="translate(200, 200)" fill="rgba(255,255,255,0.15)">
    <circle cx="0" cy="0" r="80"/>
  </g>
  <g transform="translate(200, 180)" fill="rgba(255,255,255,0.25)">
    <circle cx="0" cy="0" r="60"/>
  </g>
  <g transform="translate(200, 200)" fill="rgba(255,255,255,0.35)">
    <circle cx="0" cy="0" r="40"/>
  </g>
  <g transform="translate(200, 200)" fill="rgba(255,255,255,0.5)">
    <circle cx="0" cy="0" r="20"/>
  </g>
  <!-- 音符 -->
  <text x="200" y="190" font-family="Arial" font-size="80" fill="rgba(255,255,255,0.6)" text-anchor="middle" dominant-baseline="middle">♫</text>
</svg>